<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriAI Pro - Plant Disease Detection</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            color: #2d3436;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .logo {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, #f8f9fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .model-info {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 12px 20px;
            margin-top: 10px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .upload-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 25px;
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .upload-card:hover {
            transform: translateY(-5px);
        }

        .upload-icon {
            font-size: 3.8rem;
            color: #00b894;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .upload-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 8px;
            text-align: center;
        }

        .upload-subtitle {
            color: #636e72;
            font-size: 0.92rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .file-input {
            display: none;
        }

        .upload-area {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border: 3px dashed #00b894;
            border-radius: 16px;
            padding: 45px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .upload-area:hover {
            background: linear-gradient(135deg, #e8f5e8, #d1ece5);
            border-color: #00a085;
            transform: scale(1.02);
        }

        .upload-area.dragover {
            border-color: #00b894;
            background: linear-gradient(135deg, #c3e6cb 0%, #a8dadc 100%);
            transform: scale(1.05);
        }

        .preview-container {
            display: none;
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .preview-image {
            max-width: 100%;
            max-height: 240px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .analyze-btn {
            background: linear-gradient(45deg, #00b894, #00d4aa);
            color: white;
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 12px 30px rgba(0, 184, 148, 0.4);
        }

        .analyze-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 184, 148, 0.5);
        }

        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .results-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            display: none;
            animation: slideUp 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-top: 20px;
        }

        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(50px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        .disease-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .disease-icon {
            font-size: 5rem;
            background: linear-gradient(45deg, #e17055, #d63031);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .disease-name {
            font-size: 1.7rem;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .confidence-bar {
            background: #e9ecef;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b894, #00d4aa);
            transition: width 1.5s ease;
            border-radius: 6px;
            position: relative;
        }

        .confidence-fill::after {
            content: attr(data-confidence) + '%';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .top-predictions {
            margin-top: 25px;
        }

        .prediction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.7);
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .pred-name {
            font-weight: 600;
            color: #2d3436;
        }

        .pred-score {
            font-weight: 700;
            color: #00b894;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 50px 25px;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid #e9ecef;
            border-top: 6px solid #00b894;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .reset-btn {
            background: linear-gradient(45deg, #636e72, #b2bec3);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            width: 100%;
            font-size: 1rem;
        }

        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(99, 110, 114, 0.4);
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            .logo { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-seedling"></i>
                AgriAI Pro
            </div>
            <div class="model-info">
                <i class="fab fa-hugging-face"></i> 
                linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification
            </div>
        </div>

        <div class="upload-card" id="uploadCard">
            <i class="fas fa-camera-retro upload-icon"></i>
            <div class="upload-title">Upload Foto Tanaman</div>
            <div class="upload-subtitle">AI akan mendeteksi 50+ jenis penyakit tanaman</div>

            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3rem; color: #00b894; margin-bottom: 15px;"></i>
                <div style="font-size: 1.1rem; font-weight: 600;">Klik atau Drag & Drop</div>
                <div style="font-size: 0.88rem; color: #95a5a6;">JPG, PNG (max 5MB)</div>
            </div>

            <input type="file" id="fileInput" class="file-input" accept="image/*">

            <div class="preview-container" id="previewContainer">
                <img id="previewImage" class="preview-image" alt="Preview Tanaman">
                <button class="analyze-btn" id="analyzeBtn" disabled>
                    <i class="fas fa-robot"></i> Deteksi Penyakit dengan AI
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div style="font-size: 1.2rem; font-weight: 600; margin-bottom: 10px;">
                    AI Hugging Face sedang menganalisa...
                </div>
                <div style="font-size: 0.95rem; opacity: 0.8;">Model MobileNet V2 Plant Disease</div>
            </div>
        </div>

        <div class="results-card" id="resultsCard">
            <div class="disease-header">
                <i class="fas fa-bug disease-icon"></i>
                <div class="disease-name" id="diseaseName">Memproses...</div>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill" style="width: 0%" data-confidence="0"></div>
                </div>
            </div>

            <div class="top-predictions" id="topPredictions"></div>

            <button class="reset-btn" onclick="resetApp()">
                <i class="fas fa-redo-alt"></i> Analisa Gambar Baru
            </button>

            <div id="errorContainer" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <script>
        // === KONFIGURASI HUGGING FACE ===
        const HF_MODEL = "linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification";
        const HF_TOKEN = "YOUR_HF_TOKEN_HERE"; // ← GANTI DENGAN TOKEN ANDA!

        // DOM Elements
        const elements = {
            uploadArea: document.getElementById('uploadArea'),
            fileInput: document.getElementById('fileInput'),
            previewContainer: document.getElementById('previewContainer'),
            previewImage: document.getElementById('previewImage'),
            analyzeBtn: document.getElementById('analyzeBtn'),
            resultsCard: document.getElementById('resultsCard'),
            loading: document.getElementById('loading'),
            diseaseName: document.getElementById('diseaseName'),
            confidenceFill: document.getElementById('confidenceFill'),
            topPredictions: document.getElementById('topPredictions'),
            errorContainer: document.getElementById('errorContainer')
        };

        // Event Listeners
        elements.uploadArea.addEventListener('click', () => elements.fileInput.click());
        elements.fileInput.addEventListener('change', handleImageUpload);
        
        ['dragover', 'dragleave', 'drop'].forEach(event => {
            elements.uploadArea.addEventListener(event, handlers[event]);
        });
        
        elements.analyzeBtn.addEventListener('click', analyzeWithHuggingFace);

        // Event Handlers
        const handlers = {
            dragover: (e) => {
                e.preventDefault();
                elements.uploadArea.classList.add('dragover');
            },
            dragleave: (e) => {
                e.preventDefault();
                elements.uploadArea.classList.remove('dragover');
            },
            drop: (e) => {
                e.preventDefault();
                elements.uploadArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    handleFile(file);
                }
            }
        };

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) handleFile(file);
        }

        function handleFile(file) {
            if (file.size > 5 * 1024 * 1024) {
                showError('File terlalu besar! Maksimal 5MB');
                return;
            }
            if (!file.type.startsWith('image/')) {
                showError('Hanya file gambar JPG/PNG yang diizinkan');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                elements.previewImage.src = e.target.result;
                elements.previewContainer.style.display = 'block';
                elements.analyzeBtn.disabled = false;
                elements.previewContainer.scrollIntoView({ behavior: 'smooth' });
            };
            reader.readAsDataURL(file);
        }

        async function analyzeWithHuggingFace() {
            const file = elements.fileInput.files[0];
            if (!file) return;

            // UI States
            showLoading(true);
            elements.resultsCard.style.display = 'block';
            elements.resultsCard.scrollIntoView({ behavior: 'smooth' });

            try {
                // Convert file to ArrayBuffer (equivalent to fs.readFileSync)
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);

                // Hugging Face Inference API Call
                const response = await fetch(`https://api-inference.huggingface.co/models/${HF_MODEL}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${HF_TOKEN}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ inputs: uint8Array })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API ${response.status}: ${errorText}`);
                }

                const output = await response.json();
                displayResults(output);

            } catch (error) {
                console.error('AI Analysis Error:', error);
                showError(`Gagal analisa: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(output) {
            if (!output || !Array.isArray(output)) {
                throw new Error('Format hasil tidak valid dari AI');
            }

            // Sort by confidence (descending)
            const sortedResults = output
                .sort((a, b) => b.score - a.score)
                .slice(0, 5);

            // Top prediction
            const top = sortedResults[0];
            elements.diseaseName.textContent = top.label;
            elements.confidenceFill.style.width = `${top.score * 100}%`;
            elements.confidenceFill.dataset.confidence = Math.round(top.score * 100);

            // Top 5 predictions
            elements.topPredictions.innerHTML = `
                <div style="margin-bottom: 15px; font-weight: 600; color: #00b894;">
                    <i class="fas fa-list"></i> Top 5 Prediksi:
                </div>
                ${sortedResults.map((pred, i) => `
                    <div class="prediction-item">
                        <div class="pred-name">${pred.label}</div>
                        <div class="pred-score">${(pred.score * 100).toFixed(1)}%</div>
                    </div>
                `).join('')}
            `;

            elements.errorContainer.style.display = 'none';
        }

        function showLoading(show) {
            elements.loading.style.display = show ? 'block' : 'none';
            elements.analyzeBtn.disabled = show;
        }

        function showError(message) {
            elements.errorContainer.innerHTML = `
                <i class="fas fa-exclamation-triangle" style="font-size: 1.5rem; margin-bottom: 10px;"></i>
                <div style="font-weight: 600; margin-bottom: 8px;">${message}</div>
                <div style="font-size: 0.9rem; opacity: 0.8;">
                    Pastikan token HF valid dan model online
                </div>
            `;
            elements.errorContainer.style.display = 'block';
        }

        function resetApp() {
            elements.resultsCard.style.display = 'none';
            elements.previewContainer.style.display = 'none';
            elements.loading.style.display = 'none';
            elements.fileInput.value = '';
            elements.analyzeBtn.disabled = true;
            elements.errorContainer.style.display = 'none';
            elements.diseaseName.textContent = 'Memproses...';
            document.getElementById('uploadCard').scrollIntoView({ behavior: 'smooth' });
        }

        // Token Warning
        if (HF_TOKEN === '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') {
            setTimeout(() => alert(`
🚨 SETUP HUGGING FACE TOKEN!

1. https://huggingface.co/settings/tokens → New Token
2. Ganti: const HF_TOKEN = "hf_xxxxxxxxxxxxxxxxxxxxxx";
3. Model sudah ✅: linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification

DETEKSI 50+ PENYAKIT TANAMAN REAL-TIME!
            `), 800);
        }
    </script>
</body>
</html>
